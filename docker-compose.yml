volumes:
  dbvolume:
  home:
services:
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: dunya
      POSTGRES_DB: dunya
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - dbvolume:/var/lib/postgresql/data/
    command: postgres -F

  redis:
    image: redis:8

  web:
    build:
      context: .
      target: dev
    # essentia only publishes x86_64 wheels, so the image must be amd64
    # everywhere (same as the Makefile's production build).
    platform: linux/amd64
    image: dunya
    pull_policy: never
    command: python3 manage.py runserver 0.0.0.0:8000
    init: true
    volumes:
      - .:/code
      - /code/.venv
      - ./media:/media/
      - ${DUNYA_DATA}:/incoming
      - home:/root
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    env_file:
      - environment

  # All celery hosts should listen on a queue of the same name as their host/name (-Q and -n)
  celeryimport:
    image: dunya
    platform: linux/amd64
    pull_policy: never
    command: celery --app dunya worker -l info -Q import,celeryimport -n celeryimport
    volumes:
      - .:/code
      - /code/.venv
      - ${DUNYA_DATA}:/incoming
    env_file:
      - environment
    depends_on:
      - db
      - redis
  celeryprocess:
    image: dunya
    platform: linux/amd64
    pull_policy: never
    command: celery --app dunya worker -l info -Q celery,celeryprocess -n celeryprocess
    volumes:
      - .:/code
      - /code/.venv
      - ${DUNYA_DATA}:/incoming
    env_file:
      - environment
    depends_on:
      - db
      - redis
